<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bitcoin People - Maintenance</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Montserrat', sans-serif; overflow: hidden; position: relative; }
        .background { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(-45deg, #0a0a0a, #1a1a2e, #16213e, #0f0f23); background-size: 400% 400%; animation: gradientShift 15s ease infinite; z-index: -3; }
        @keyframes gradientShift { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; overflow: hidden; }
        .particle { position: absolute; width: 4px; height: 4px; background: rgba(247, 181, 0, 0.6); border-radius: 50%; animation: float 20s infinite; opacity: 0; }
        .particle:nth-child(1) { left: 10%; animation-delay: 0s; animation-duration: 25s; }
        .particle:nth-child(2) { left: 20%; animation-delay: 2s; animation-duration: 20s; }
        .particle:nth-child(3) { left: 30%; animation-delay: 4s; animation-duration: 28s; }
        .particle:nth-child(4) { left: 40%; animation-delay: 1s; animation-duration: 22s; }
        .particle:nth-child(5) { left: 50%; animation-delay: 3s; animation-duration: 26s; }
        .particle:nth-child(6) { left: 60%; animation-delay: 5s; animation-duration: 24s; }
        .particle:nth-child(7) { left: 70%; animation-delay: 2s; animation-duration: 21s; }
        .particle:nth-child(8) { left: 80%; animation-delay: 4s; animation-duration: 27s; }
        .particle:nth-child(9) { left: 90%; animation-delay: 1s; animation-duration: 23s; }
        .particle:nth-child(10) { left: 15%; animation-delay: 3s; animation-duration: 19s; }
        @keyframes float { 0% { transform: translateY(100vh) scale(0); opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { transform: translateY(-100vh) scale(1.5); opacity: 0; } }
        .orb { position: fixed; border-radius: 50%; filter: blur(80px); z-index: -1; animation: pulse 8s ease-in-out infinite; }
        .orb-1 { width: 400px; height: 400px; background: rgba(247, 181, 0, 0.15); top: -100px; right: -100px; }
        .orb-2 { width: 300px; height: 300px; background: rgba(247, 147, 26, 0.1); bottom: -50px; left: -50px; animation-delay: 4s; }
        .orb-3 { width: 200px; height: 200px; background: rgba(255, 215, 0, 0.08); top: 50%; left: 50%; transform: translate(-50%, -50%); animation-delay: 2s; }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.5; } 50% { transform: scale(1.2); opacity: 0.8; } }
        .container { text-align: center; padding: 40px; max-width: 600px; animation: fadeInUp 1.5s ease-out; }
        @keyframes fadeInUp { 0% { opacity: 0; transform: translateY(30px); } 100% { opacity: 1; transform: translateY(0); } }
        .logo-text { font-family: 'Playfair Display', serif; font-size: 3rem; font-weight: 600; color: #ffffff; margin-bottom: 10px; letter-spacing: 3px; animation: glow 3s ease-in-out infinite; }
        .logo-bitcoin { color: #f7b500; }
        @keyframes glow { 0%, 100% { text-shadow: 0 0 20px rgba(247, 181, 0, 0.2); } 50% { text-shadow: 0 0 40px rgba(247, 181, 0, 0.4); } }
        .bitcoin-symbol { font-size: 80px; color: #f7b500; margin-bottom: 30px; animation: float-symbol 4s ease-in-out infinite; filter: drop-shadow(0 0 30px rgba(247, 181, 0, 0.4)); }
        @keyframes float-symbol { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        h1 { font-family: 'Playfair Display', serif; font-size: 3.5rem; font-weight: 600; color: #ffffff; margin-bottom: 20px; margin-top: 40px; letter-spacing: 2px; text-shadow: 0 0 40px rgba(255, 255, 255, 0.1); }
        .subtitle { font-size: 1.1rem; font-weight: 300; color: rgba(255, 255, 255, 0.7); margin-bottom: 40px; line-height: 1.8; }
        .status { display: inline-flex; align-items: center; gap: 10px; padding: 12px 24px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 50px; color: rgba(255, 255, 255, 0.8); font-size: 0.9rem; backdrop-filter: blur(10px); }
        .status-dot { width: 10px; height: 10px; background: #f7b500; border-radius: 50%; animation: blink 2s ease-in-out infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .contact { margin-top: 50px; color: rgba(255, 255, 255, 0.5); font-size: 0.85rem; }
        .contact a { color: #f7b500; text-decoration: none; transition: color 0.3s ease; }
        .contact a:hover { color: #ffd700; }
        .bitcoin-icon { position: fixed; font-size: 150px; color: rgba(247, 181, 0, 0.03); z-index: -1; animation: rotate 60s linear infinite; }
        .bitcoin-icon-1 { top: 10%; left: 5%; }
        .bitcoin-icon-2 { bottom: 15%; right: 8%; animation-direction: reverse; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @media (max-width: 768px) { h1 { font-size: 2.5rem; } .logo-text { font-size: 2rem; } .subtitle { font-size: 1rem; } .bitcoin-symbol { font-size: 60px; } }
        @media (max-width: 480px) { h1 { font-size: 2rem; } .logo-text { font-size: 1.5rem; } .container { padding: 20px; } }
    </style>
</head>
<body>
    <div class="background"></div>
    <div class="particles">
        <div class="particle"></div><div class="particle"></div><div class="particle"></div><div class="particle"></div><div class="particle"></div>
        <div class="particle"></div><div class="particle"></div><div class="particle"></div><div class="particle"></div><div class="particle"></div>
    </div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="bitcoin-icon bitcoin-icon-1">₿</div>
    <div class="bitcoin-icon bitcoin-icon-2">₿</div>

    <div class="container">
        <div class="bitcoin-symbol">₿</div>
        <div class="logo-text"><span class="logo-bitcoin">Bitcoin</span> People</div>
        <h1 id="title">We'll Be Back Soon</h1>
        <p class="subtitle" id="subtitle">We're working to improve your experience.<br>The service will be available again shortly.</p>
        <div class="status">
            <span class="status-dot"></span>
            <span id="status-text">Maintenance in progress</span>
        </div>
        <div class="contact">
            <span id="contact-text">Need help?</span> <a href="mailto:info@bitcoinpeople.it">info@bitcoinpeople.it</a>
        </div>
    </div>

    <script>
        const lang = navigator.language || navigator.userLanguage;
        const isItalian = lang.toLowerCase().startsWith('it');
        if (isItalian) {
            document.getElementById('title').textContent = 'Torneremo Presto';
            document.getElementById('subtitle').innerHTML = 'Stiamo lavorando per migliorare la tua esperienza.<br>Il servizio sarà nuovamente disponibile a breve.';
            document.getElementById('status-text').textContent = 'Manutenzione in corso';
            document.getElementById('contact-text').textContent = 'Hai bisogno di aiuto?';
            document.documentElement.lang = 'it';
        }
    </script>
</body>
</html>
